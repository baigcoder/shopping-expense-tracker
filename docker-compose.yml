services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:5173
      REDIS_URL: redis://redis:6379
      FIREBASE_PROJECT_ID: tracker-3960c
      FIREBASE_STORAGE_BUCKET: tracker-3960c.firebasestorage.app
    ports:
      - "5000:5000"
    depends_on:
      - redis
    restart: unless-stopped

  ai-server:
    build:
      context: ./ai-server
    env_file:
      - ./ai-server/.env
    environment:
      PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_AI_SERVER_URL: http://localhost:8000
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-AIzaSyAbveJm46vlt1CKqEdYQE-c21QbZBrNpEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-tracker-3960c.firebaseapp.com}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-tracker-3960c}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-tracker-3960c.firebasestorage.app}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-212101348862}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-1:212101348862:web:dd9742ccc5d1f2baf314af}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-G-CXVV4Q3JYB}
    env_file:
      - ./frontend/.env
    ports:
      - "5173:80"
    depends_on:
      - backend
      - ai-server
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
